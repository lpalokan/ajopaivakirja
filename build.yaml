# Configures bdd_widget_test: it turns integration_test/features/*.feature
# (plain-English Gherkin) into runnable *_test.dart on the emulator.
#
# Step implementations live in integration_test/features/step/ and delegate
# to integration_test/support/harness.dart. Because the feature files live
# under integration_test/, the generated tests get the
# IntegrationTestWidgetsFlutterBinding automatically.
#
# Regenerate with:  dart run build_runner build --delete-conflicting-outputs
targets:
  $default:
    builders:
      bdd_widget_test:
        options:
          stepFolderName: step
