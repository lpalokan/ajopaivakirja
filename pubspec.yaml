name: kilometrikorvaus
description: "Mileage and daily allowance tracker for work trips"
publish_to: "none"
version: 1.0.0+8

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 2.6.1 # pinned: app code uses Riverpod 2 StateNotifier API
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  google_sign_in: 6.3.0 # pinned: app code uses google_sign_in 6 API
  googleapis: ^14.0.0
  googleapis_auth: ^1.6.0
  http: ^1.3.0
  geolocator: ^13.0.2
  flutter_background_service: ^5.1.0
  flutter_local_notifications: 18.0.1 # pinned: app code uses fln 18 positional API
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  timezone: ^0.10.1
  path: ^1.9.1
  share_plus: ^13.1.0
  open_filex: ^4.4.0
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.1.2
  pdf: ^3.11.2
  printing: ^5.14.2
  material_symbols_icons: ^4.2830.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bdd_widget_test: ^1.7.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
