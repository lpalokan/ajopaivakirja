name: kilometrikorvaus
description: "Mileage and daily allowance tracker for work trips"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  google_sign_in: ^6.3.0
  googleapis: ^14.0.0
  googleapis_auth: ^1.6.0
  http: ^1.3.0
  geolocator: ^13.0.2
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^18.0.1
  intl: ^0.20.2
  uuid: ^4.5.1
  collection: ^1.19.1
  timezone: ^0.10.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
